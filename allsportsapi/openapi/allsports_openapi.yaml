      tags:
      - TV
      parameters:
      - name: channId
        in: path
        required: true
        schema:
          type: integer
        description: The unique identifier for the TV channel
        example: 3177
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: The unique identifier for the match
        example: 10974920
      responses:
