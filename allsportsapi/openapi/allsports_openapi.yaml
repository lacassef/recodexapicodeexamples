openapi: 3.0.0
info:
  title: AllSports API
  version: 1.0.0
  description: Merged OpenAPI specification generated from SofaScore route annotations.
servers:
- url: http://localhost:8080
  description: Local development server
paths:
  /api/tv/country/all/event/{id}:
    get:
      summary: Get match TV countries
      description: Lists the countries and the TV channels within them that are broadcasting
        a specific match.
      tags:
      - AllSports
      - TV
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: The unique identifier for the match
        example: 14081808
      responses:
        '200':
          description: A JSON object listing countries and their broadcasting channels.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JSONResult'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '204':
          description: No content. The requested route exists but there is no data available for the given parameters 
            (e.g. match has no TV coverage, no statistics yet, empty search results, etc.).
  /api/tv/channel/{channId}/event/{id}:
    get:
      summary: Get match TV channel votes
      description: Fetches viewer voting data from a specific TV channel that is broadcasting
        the match.
      tags:
      - AllSports
      - TV
      parameters:
      - name: channId
        in: path
        required: true
        schema:
          type: integer
        description: The unique identifier for the TV channel
        example: 3177
      - name: id
        in: path
        required: true
        schema:
          type: integer
        description: The unique identifier for the match
        example: 10974920
      responses:
        '200':
          description: A JSON object containing viewer vote data from the channel.
          content:
            application/json:
              schema:
